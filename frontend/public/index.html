<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAI — Personal AI</title>
    <link rel="stylesheet" href="styles.css?v=20260416a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f1117">
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-box">
            <h1>PAI</h1>
            <span class="login-subtitle">Personal AI Orchestrator</span>
            <div id="existing-users"></div>
            <div class="login-new">
                <input type="text" id="login-name" placeholder="Enter your first name..." maxlength="50" autocomplete="off">
                <button id="login-btn" type="button">Sign In</button>
            </div>
            <div id="login-error" style="display:none;color:#f44336;font-size:13px;margin-top:12px"></div>
        </div>
    </div>

    <!-- App (hidden until login) -->
    <div id="app" class="hidden">
        <!-- Mobile sidebar toggle -->
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Menu">&#9776;</button>
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h1>PAI</h1>
                <div class="user-info">
                    <span id="user-name-display"></span>
                    <button id="logout-btn" class="logout-btn" title="Switch User">&#x21C4;</button>
                </div>
            </div>

            <!-- Conversation History -->
            <div class="sidebar-section">
                <label>Conversations</label>
                <button id="new-chat-btn" class="secondary-btn" style="width:100%;margin-bottom:6px">+ New Chat</button>
                <div id="conversation-list" class="conversation-list"></div>
            </div>

            <div class="sidebar-section">
                <label>Mode</label>
                <div class="mode-buttons">
                    <button class="mode-btn active" data-mode="chat">Chat</button>
                    <button class="mode-btn" data-mode="task">Task</button>
                    <button class="mode-btn" data-mode="research">Research</button>
                    <button class="mode-btn" data-mode="compete">Compete</button>
                    <button class="mode-btn" data-mode="meals">Meals</button>
                    <button class="mode-btn" data-mode="home">Home</button>
                    <button class="mode-btn" data-mode="medical">Medical</button>
                    <button class="mode-btn" data-mode="recipes">Recipes</button>
                    <button class="mode-btn" data-mode="calendar">Calendar</button>
                    <button class="mode-btn" data-mode="workout">Workout</button>
                    <button class="mode-btn" data-mode="skills">Skills</button>
                </div>
            </div>

            <div id="research-options" class="sidebar-section hidden">
                <label for="time-filter">Time Range</label>
                <select id="time-filter">
                    <option value="d">Past Day</option>
                    <option value="w">Past Week</option>
                    <option value="m" selected>Past Month</option>
                    <option value="y">Past Year</option>
                </select>
                <label class="checkbox-label">
                    <input type="checkbox" id="auto-ingest" checked> Auto-ingest to memory
                </label>
            </div>

            <div id="compete-options" class="sidebar-section hidden">
                <label>Agents</label>
                <div class="agent-checkboxes">
                    <label class="checkbox-label"><input type="checkbox" value="research" checked> Research</label>
                    <label class="checkbox-label"><input type="checkbox" value="analysis" checked> Analysis</label>
                    <label class="checkbox-label"><input type="checkbox" value="planning"> Planning</label>
                    <label class="checkbox-label"><input type="checkbox" value="critic"> Critic</label>
                </div>
                <label for="strategy-select">Strategy</label>
                <select id="strategy-select">
                    <option value="best_score">Best Score</option>
                    <option value="weighted">Weighted</option>
                    <option value="synthesize">Synthesize</option>
                </select>
            </div>

            <div id="meals-options" class="sidebar-section hidden">
                <button id="load-family-btn" class="secondary-btn" style="width:100%;margin-bottom:8px">Load Family &amp; Prefs</button>
                <button id="gen-plan-btn" class="secondary-btn" style="width:100%;margin-bottom:8px">Generate Meal Plan</button>
                <button id="view-plans-btn" class="secondary-btn" style="width:100%">View Past Plans</button>
            </div>

            <div id="medical-options" class="sidebar-section hidden">
                <button id="medical-records-btn" class="secondary-btn" style="width:100%;margin-bottom:8px">View Records</button>
                <label class="upload-btn secondary-btn" style="width:100%;margin-bottom:8px;display:block;text-align:center;cursor:pointer">
                    Upload Medical PDF
                    <input type="file" id="medical-upload" accept=".pdf,.jpg,.jpeg,.png" style="display:none">
                </label>
            </div>

            <div id="recipes-options" class="sidebar-section hidden">
                <button id="recipes-list-btn" class="secondary-btn" style="width:100%;margin-bottom:8px">View Saved Recipes</button>
                <div style="display:flex;gap:6px;margin-bottom:8px">
                    <input type="text" id="recipe-search" placeholder="Search recipes..." style="flex:1;padding:6px 10px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-size:13px">
                    <button id="recipe-search-btn" class="secondary-btn" style="padding:6px 12px">Go</button>
                </div>
            </div>

            <div id="calendar-options" class="sidebar-section hidden">
                <button id="calendar-agenda-btn" class="secondary-btn" style="width:100%;margin-bottom:8px">View Agenda</button>
                <button id="calendar-events-btn" class="secondary-btn" style="width:100%">All Events</button>
            </div>

            <div id="home-options" class="sidebar-section hidden">
                <button id="home-items-btn" class="secondary-btn" style="width:100%;margin-bottom:8px">View Items &amp; Tasks</button>
                <button id="home-alerts-btn" class="secondary-btn" style="width:100%;margin-bottom:8px">Check Alerts</button>
                <button id="home-docs-btn" class="secondary-btn" style="width:100%;margin-bottom:8px">Search Documents</button>
                <label class="upload-btn secondary-btn" style="width:100%;display:block;text-align:center;cursor:pointer">
                    Upload Home Document
                    <input type="file" id="home-upload" accept=".pdf,.txt,.md,.html" style="display:none">
                </label>
            </div>

            <div id="workout-options" class="sidebar-section hidden">
                <button id="workout-today-btn" class="secondary-btn" style="width:100%;margin-bottom:8px">Today's Workout</button>
                <button id="workout-programs-btn" class="secondary-btn" style="width:100%;margin-bottom:8px">View Programs</button>
                <button id="workout-logs-btn" class="secondary-btn" style="width:100%">Recent Logs</button>
            </div>

            <div id="skills-options" class="sidebar-section hidden">
                <button id="skills-load-btn" class="secondary-btn" style="width:100%;margin-bottom:8px">Refresh Skills</button>
            </div>

            <div class="sidebar-footer">
                <button id="clear-btn" class="secondary-btn">Clear Chat</button>
                <div id="health-indicator">
                    <span class="health-dot"></span>
                    <span id="health-text">Checking...</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main">
            <div id="messages"></div>

            <div id="input-area">
                <textarea id="user-input" placeholder="Type a message..." rows="2"></textarea>
                <button id="send-btn" title="Send">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
        </main>
    </div>

    <script src="app.js?v=20260416a"></script>
</body>
</html>
